slam_toolbox:
  ros__parameters:

    # ── Frames e tópicos ────────────────────────────────────────────
    odom_frame:  odom
    map_frame:   map
    base_frame:  base_link
    scan_topic:  /jetauto/lidar/scan
    mode:        mapping

    # ── Tempo de simulação ──────────────────────────────────────────
    use_sim_time: true

    # ── Resolução e atualização do mapa ────────────────────────────
    resolution:            0.05   # metros por célula
    map_update_interval:   1.0    # segundos entre atualizações do mapa

    # ── LiDAR ──────────────────────────────────────────────────────
    max_laser_range:  10.0        # alcance máximo considerado (m)
    throttle_scans:   1           # processa 1 de cada N scans

    # ── Publicação do TF map→odom ──────────────────────────────────
    transform_publish_period: 0.02
    transform_timeout:        0.2
    tf_buffer_duration:       30.0

    # ── Scan matching ──────────────────────────────────────────────
    use_scan_matching:    true
    use_scan_barycenter:  true
    minimum_travel_distance: 0.3   # mínimo para processar novo scan (m)
    minimum_travel_heading: 0.3    # mínimo para processar novo scan (rad)

    # ── Loop closure ───────────────────────────────────────────────
    do_loop_closing:                    true
    loop_search_maximum_distance:       3.0
    loop_match_minimum_chain_size:      10
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine:   0.45

    # ── Outros ─────────────────────────────────────────────────────
    debug_logging:       false
    enable_interactive_mode: false
    stack_size_to_use:   40000000
